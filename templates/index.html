<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../styles/styles.css">

</head>
<body>
<header class="top-bar">
  <h1>Gestor Financeiro</h1>
</header>

<!-- ============================================ -->
<!-- NAVEGAÇÃO MOVIDA PARA CIMA (LOGO APÓS HEADER) -->
<!-- ============================================ -->
<nav class="top-nav">
  <a href="index.html" class="nav-item active">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Dashboard</span>
  </a>
  <a href="conta.html" class="nav-item">
    <span class="nav-icon">💸</span>
    <span class="nav-label">Conta</span>
  </a>
  <a href="categorias.html" class="nav-item">
    <span class="nav-icon">📁</span>
    <span class="nav-label">Categorias</span>
  </a>
  <a href="historico.html" class="nav-item">
    <span class="nav-icon">📋</span>
    <span class="nav-label">Histórico</span>
  </a>
   <a href="transfer.html" class="nav-item">
            <span class="nav-icon">🔄</span>
            <span class="nav-label">Transferência</span>
    </a>
  <a href="options.html" class="nav-item">
    <span class="nav-icon">⚙️</span>
    <span class="nav-label">Configurações</span>
  </a>
</nav>
<!-- ============================================ -->

<main>
  <section class="summary-card">
    <h2 id="monthYear">--</h2>

    <div class="summary-item">
      <span>Despesa Total </span>
      <strong id="despesaTotal">0 esc</strong>
    </div>
    <div class="summary-item">
      <span>Orçamento restante </span>
      <strong id="orcamentoRestante">0 esc</strong>
    </div>
  </section>

  <!--Secção do gráfico de pizza-->
  <div class="chart-section">
    <h3 class="chart-title">Despesas por Categoria</h3>
    <div class="chart-container">
      <canvas id="pieChart"></canvas>
    </div>
  </div>

  <!--Secção do gráfico de barras-->
  <div class="chart-section">
    <h3 class="chart-title">Comparação Mensal de Gastos</h3>
    <div class="chart-container-large">
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <!--Seção do gráfico de linhas -->
  <div class="chart-section">
    <h3 class="chart-title">Evolução de Despesas ao Longo do Tempo</h3>
    <div class="chart-container-large">
      <canvas id="lineChart"></canvas>
    </div>
  </div>
</main>

<!--Botão flutuante-->
<button class="floating-btn" id="addExpenseBtn">
  <span class="pen-icon">✏️</span>
</button>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3>Nova Despesa</h3>

    <div class="form-group">
      <label>Título:</label>
      <input type="text" id="gastoInput" placeholder="Título do gasto">
    </div>

    <div class="form-group">
      <label>Descrição:</label>
      <input type="text" id="descricaoInput" placeholder="Detalhes sobre o gasto">
    </div>

    <div class="form-group">
      <label>Categoria:</label>
      <div class="dropdown">
        <button class="dropdown-btn" id="categoryBtn">Selecionar categoria</button>
        <div class="dropdown-content" id="dropdownContent">
          <a href="#" data-value="Alimentação">Alimentação</a>
          <a href="#" data-value="Saúde">Saúde</a>
          <a href="#" data-value="Lazer">Lazer</a>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Valor (CVE):</label>
      <input type="number" id="valorInput" placeholder="0.00" step="0.01">
    </div>

    <div class="modal-actions">
      <button class="btn-save" id="saveBtn">Salvar</button>
      <button class="btn-cancel" id="cancelBtn">Cancelar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../scripts/graficos.js"></script>
<script src="../scripts/api-config.js"></script>
<script src="../scripts/dashboard.js"></script>
<script src="../scripts/modal.js"></script>
</body>
</html>
