<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferência</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <div class="container">
        <h1>Transferência de Saldo</h1>
        <form id="transfer-form">
            <label for="to_username">Usuário de destino:</label>
            <input type="text" id="to_username" name="to_username" required>
            <label for="amount">Valor:</label>
            <input type="number" id="amount" name="amount" min="1" required>
            <button type="submit">Transferir</button>
        </form>
        <div id="transfer-result"></div>
    </div>
    <script src="../scripts/api-config.js"></script>
    <script src="../scripts/transfer.js"></script>
</body>
</html>
