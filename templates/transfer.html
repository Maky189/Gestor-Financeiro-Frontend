<main>
  <section class="account-section">
    <h2>Transferência de Saldo</h2>

    <form id="transfer-form">
      <div class="form-group">
        <label for="to_username">Usuário de destino:</label>
        <input type="text" id="to_username" name="to_username" placeholder="Nome do usuário" required>
      </div>

      <div class="form-group">
        <label for="amount">Valor (esc):</label>
        <input type="number" id="amount" name="amount" placeholder="0.00" min="1" step="0.01" required>
      </div>

      <div class="modal-actions">
        <button type="submit" class="btn-save">Transferir</button>
      </div>
    </form>

    <div id="transfer-result" class="transfer-result"></div>
  </section>
</main>

<script src="../scripts/api-config.js"></script>
<script src="../scripts/transfer.js"></script>
</body>
